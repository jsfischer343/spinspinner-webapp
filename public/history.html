<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/webp" href="/assets/images/spinspinner_logo.webp">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/spin.css">
    <link rel="stylesheet" href="/assets/css/history.css">
    <script type="module" src="/js/mobile-menu.js"></script>
    <script type="module" src="/js/history.js"></script>
    <title>SpinSpinner - History</title>
  </head>
  <body>
    <header class="top-bar">
      <h2>SpinSpinner</h2>
      <h6>beta</h6>
      <div class="mobile-menu-selector" id="mobile-menu-selector">
        <picture>
          <source srcset="/assets/images/menu_white.svg" media="(prefers-color-scheme: dark)" id="mobile-menu-selector-icon-dark">
          <img src="/assets/images/menu_black.svg" width="30" height="30" id="mobile-menu-selector-icon-light" alt="Menu">
        </picture>
      </div>
    </header>
    <div class="menu-nav" id="menu-nav">
      <menu>
        <li class="menu-item"><a href="/" class="menu-item">
          <picture class="menu-icon" >
            <source srcset="/assets/images/add_circle_white.svg" media="(prefers-color-scheme: dark)">
            <img src="/assets/images/add_circle_black.svg" width="25" height="25" alt="Generate">
          </picture>
          <div class="menu-text">Generate</div>
        </a></li>
        <li class="menu-item"><a href="/options.html" class="menu-item">
          <picture class="menu-icon" >
            <source srcset="/assets/images/check_box_white.svg" media="(prefers-color-scheme: dark)">
            <img src="/assets/images/check_box_black.svg" width="25" height="25" alt="Options">
          </picture>
          <div class="menu-text">Options</div>
        </a></li>
        <li class="menu-item"><a href="/resources.html" class="menu-item">
          <picture class="menu-icon" >
            <source srcset="/assets/images/book_2_white.svg" media="(prefers-color-scheme: dark)">
            <img src="/assets/images/book_2_black.svg" width="25" height="25" alt="Resources">
          </picture>
          <div class="menu-text">Resources</div>
        </a></li>
        <li class="menu-item"><a href="/history.html" class="menu-item">
          <picture class="menu-icon" >
            <source srcset="/assets/images/history_white.svg" media="(prefers-color-scheme: dark)">
            <img src="/assets/images/history_black.svg" width="25" height="25" alt="History">
          </picture>
          <div class="menu-text">History</div>
        </a></li>
      </menu>
    </div>
    <div class="history-controls-container">
      <div class="history-nav-count" id="history-nav-count">1/10</div>
      <div class="history-nav-arrows" id="history-nav-left">&#60;</div>
      <div class="history-nav-arrows" id="history-nav-right">&#62;</div>
    </div>
    <div class="main-application-container place-center" id="mainapplicationcontainer">
    </div>
    <footer class="bottom-bar">
      <ul>
        <li><a href="https://github.com/jsfischer343/spinspinner-webapp">About</a></li>
        <li><a href="https://github.com/jsfischer343/spinspinner-webapp">Github</a></li>
        <li><a href="https://tally.so/r/BzlyL1">Contact</a></li>
        <li><a href="https://tally.so/r/2ExpKe">Beta Survey</a></li>
        <li><a href="https://tally.so/r/XxkaBz">Report Bug</a></li>
        <li><a href="https://tally.so/r/VLAe16">Report Rule Inconsistency</a></li>
        <li><a href="/assets/documents/LICENSE.txt">Licence</a></li>
      </ul>
      <div class="footer-app-info">SpinSpinner v1.1 beta</div>
    </footer>
  </body>
</html>
